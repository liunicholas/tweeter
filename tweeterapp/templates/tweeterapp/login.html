<!DOCTYPE html>
<html lang="en-US">
<head>
  <!-- django 3
  python 3.8 -->
  <title>Tweeter Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- bootstrap4 -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <!-- css -->
  {% load static %}
  <link rel="stylesheet" type="text/css" href="{% static 'tweeterapp/tweeter.css' %}">
</head>
  <body>
    <div class="post">
      <h1>Tweeter App</h1>
    </div>

    <br />

    <div class="post">
      <form action="{% url 'authentication' %}" method="post">
      {% csrf_token %}
        <br />
        <label>username:</label>
        <input type="text" name="username"><br><br>
        <label>password:</label>
        <input type="password" name="password"><br><br>
        <!-- goes to authentication in views -->
        <input type="submit" class="btn-info" value="Login">
      </form>
    </div>

    <br />
    <button type="button" class="btn btn-warning btn-lg spcBot" data-toggle="modal" data-target="#createUser">Create New User</button>

    <!-- create user modal -->
    <div id="createUser" class="modal fade" role="dialog">
      <div class="modal-dialog post">
        <!-- Modal content-->
        <div class="modal-content">
          <div class="modal-header post">
            <h4 style="text-transform: capitalize; color:gold;" class="modal-title">Create User</h4>
          </div>
          <div class="modal-body post">
            <form action="{% url 'newUser' %}" method="post">
            {% csrf_token %}
              <label>Username:</label>
              <input type="text" name="username"><br><br>
              <label>password:</label>
              <input type="password" name="password"><br><br>
              <label>type password again:</label>
              <input type="password" name="password2"><br><br>
              <input type="submit" style="background:blue" value="Create">
            </form>
          </div>
          <div class="modal-footer post">
            <button type="button" class="btn btn-default" style="background:red" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
